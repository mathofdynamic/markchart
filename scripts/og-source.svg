<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b0b14"/>
      <stop offset="1" stop-color="#09090b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.12" r="0.9">
      <stop offset="0" stop-color="#4f46e5" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="logo" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#ffffff" fill-opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- brand mark -->
  <g transform="translate(96,96)">
    <rect width="120" height="120" rx="28" fill="url(#logo)"/>
    <g fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M60 43 V62 M60 62 H34 V75 M60 62 H86 V75"/>
    </g>
    <g fill="#ffffff">
      <circle cx="60" cy="35" r="9.5"/>
      <circle cx="34" cy="84" r="9.5"/>
      <circle cx="86" cy="84" r="9.5"/>
    </g>
  </g>

  <!-- wordmark + tagline -->
  <text x="98" y="320" font-family="Arial, Helvetica, sans-serif" font-size="108" font-weight="800" fill="#ffffff" letter-spacing="-3">MarkChart</text>
  <text x="100" y="392" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="600" fill="#c7d2fe">Draw a flowchart. Copy AI-ready text.</text>
  <text x="100" y="452" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="400" fill="#8b8b9e">Turn branching, looping logic into Markdown &amp; Mermaid an AI can read.</text>

  <!-- pills -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">
    <g transform="translate(100,506)">
      <rect width="190" height="58" rx="29" fill="#18181b" stroke="#3f3f46" stroke-width="1.5"/>
      <text x="95" y="38" text-anchor="middle" fill="#e4e4e7">Markdown</text>
    </g>
    <g transform="translate(306,506)">
      <rect width="172" height="58" rx="29" fill="#18181b" stroke="#3f3f46" stroke-width="1.5"/>
      <text x="86" y="38" text-anchor="middle" fill="#e4e4e7">Mermaid</text>
    </g>
    <g transform="translate(494,506)">
      <rect width="250" height="58" rx="29" fill="#18181b" stroke="#3f3f46" stroke-width="1.5"/>
      <text x="125" y="38" text-anchor="middle" fill="#e4e4e7">Cloud Sync</text>
    </g>
  </g>

  <text x="1104" y="556" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#6366f1">markchart.pages.dev</text>
</svg>
